<svg width="400" height="660" viewBox="0 0 400 660" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="400" height="660" rx="18" fill="#F4F2FA"/>

  <!-- Assistant header -->
  <rect x="12" y="12" width="376" height="40" rx="12" fill="#FFFFFF"/>
  <circle cx="34" cy="32" r="9" fill="#6C4DE0"/>
  <path d="M30.5 32l2.4 2.4 4.6-5" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="50" y="36" font-size="13" font-weight="600" fill="#1F1B2E">Trip assistant</text>
  <text x="376" y="36" font-size="10" fill="#8A8599" text-anchor="end">TravelApp</text>

  <!-- User bubble (right) -->
  <rect x="118" y="64" width="270" height="46" rx="14" fill="#6C4DE0"/>
  <text x="132" y="83" font-size="11.5" fill="#EFEAFF">Weekend stay in Bengaluru, 6–8 Sep,</text>
  <text x="132" y="99" font-size="11.5" fill="#EFEAFF">under ₹4,000?</text>

  <!-- Assistant bubble (left) -->
  <rect x="12" y="122" width="300" height="62" rx="14" fill="#FFFFFF"/>
  <text x="26" y="141" font-size="11.5" fill="#2B2738">Found 12 stays near Bengaluru. Olive Hotel,</text>
  <text x="26" y="157" font-size="11.5" fill="#2B2738">Koramangala is the best fit — 4.5 (812),</text>
  <text x="26" y="173" font-size="11.5" fill="#2B2738">₹3,299 per night.</text>

  <!-- Sponsored Suggestion card -->
  <rect x="12" y="196" width="376" height="340" rx="16" fill="#FFFFFF" stroke="#C9BDF4" stroke-width="1.5"/>

  <!-- Disclosure header -->
  <path d="M12 212a16 16 0 0 1 16-16h344a16 16 0 0 1 16 16v18H12z" fill="#EFEAFB"/>
  <text x="28" y="216" font-size="11" font-weight="600" fill="#4B3AA6">Sponsored · StayVista</text>
  <text x="352" y="216" font-size="10" fill="#6C4DE0" text-anchor="end">Why this ad?</text>
  <circle cx="368" cy="212.5" r="6.5" stroke="#6C4DE0" stroke-width="1.2" fill="none"/>
  <text x="368" y="216" font-size="9" fill="#6C4DE0" text-anchor="middle">i</text>

  <!-- Relevance chip -->
  <rect x="28" y="242" width="180" height="22" rx="11" fill="#EFEAFB"/>
  <text x="118" y="256.5" font-size="10.5" fill="#4B3AA6" text-anchor="middle">Relevant to your hotel search</text>

  <!-- Thumbnail -->
  <rect x="28" y="278" width="104" height="78" rx="10" fill="#E4E0EE"/>
  <circle cx="56" cy="302" r="9" fill="#CFC8E2"/>
  <path d="M36 344l24-22 18 15 14-11 26 18z" fill="#CFC8E2"/>

  <!-- Advertiser + title + body -->
  <rect x="146" y="278" width="18" height="18" rx="4" fill="#6C4DE0"/>
  <text x="155" y="291" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">S</text>
  <text x="170" y="291" font-size="10.5" fill="#6F6A80">StayVista · Verified offer</text>

  <text x="146" y="315" font-size="13.5" font-weight="700" fill="#1F1B2E">Save ₹1,500 on your</text>
  <text x="146" y="332" font-size="13.5" font-weight="700" fill="#1F1B2E">Bengaluru stay</text>
  <text x="146" y="350" font-size="10.5" fill="#6F6A80">Valid until 30 Sep. Save now, use</text>
  <text x="146" y="364" font-size="10.5" fill="#6F6A80">when you book.</text>

  <!-- Action CTA -->
  <defs>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7A3CF0"/>
      <stop offset="1" stop-color="#3D5AF1"/>
    </linearGradient>
  </defs>
  <rect x="28" y="382" width="344" height="44" rx="12" fill="url(#cta)"/>
  <rect x="146" y="397" width="18" height="13" rx="2.5" stroke="#FFFFFF" stroke-width="1.6" fill="none"/>
  <line x1="146" y1="401.5" x2="164" y2="401.5" stroke="#FFFFFF" stroke-width="1.6"/>
  <text x="172" y="409" font-size="13" font-weight="600" fill="#FFFFFF">Save to Google Wallet</text>

  <!-- Fallback link + footer -->
  <text x="200" y="452" font-size="12.5" font-weight="600" fill="#6C4DE0" text-anchor="middle">View hotel</text>
  <text x="200" y="476" font-size="9.5" fill="#8A8599" text-anchor="middle">Offer terms apply · Why this ad?</text>

  <!-- Wire annotation -->
  <line x1="28" y1="492" x2="372" y2="492" stroke="#EAE6F4" stroke-width="1"/>
  <text x="200" y="510" font-size="9.5" fill="#8A8599" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace">imp.ext.apex.surface = "assistant"</text>
  <text x="200" y="524" font-size="9.5" fill="#8A8599" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace">bid.ext.apex.action = save_to_wallet</text>

  <!-- Assistant follow-up bubble -->
  <rect x="12" y="548" width="286" height="46" rx="14" fill="#FFFFFF"/>
  <text x="26" y="567" font-size="11.5" fill="#2B2738">Want me to compare Olive Hotel with</text>
  <text x="26" y="583" font-size="11.5" fill="#2B2738">two similar stays?</text>

  <!-- Input bar -->
  <rect x="12" y="608" width="376" height="38" rx="19" fill="#FFFFFF"/>
  <text x="30" y="631" font-size="11" fill="#A9A4B8">Ask about your trip…</text>
  <circle cx="368" cy="627" r="13" fill="#6C4DE0"/>
  <path d="M363 627h9m0 0l-3.5-3.5m3.5 3.5l-3.5 3.5" stroke="#FFFFFF" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
